<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - NutriCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <div class="auth-wrapper d-flex justify-content-center align-items-center">
        <div class="auth-form-column w-100 d-flex justify-content-center align-items-center">
            <div class="auth-card" style="max-width: 440px; position: relative;">
                <h2 class="auth-title text-center mb-2">Redefinir Senha</h2>
                <p class="auth-subtitle text-center">Crie uma nova senha segura para sua conta.</p>
                
                <form id="resetPasswordForm">
                    <div class="form-floating mb-3 position-relative">
                        <input type="password" class="form-control" id="newPassword" placeholder="Nova Senha" required>
                        <label for="newPassword">Nova Senha</label>
                        <i class="bi bi-eye form-icon-toggle position-absolute top-50 end-0 translate-middle-y me-3" data-target="newPassword"></i>
                    </div>
                    
                    <div class="form-floating mb-4 position-relative">
                        <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirme a Nova Senha" required>
                        <label for="confirmNewPassword">Confirme a Nova Senha</label>
                        <i class="bi bi-eye form-icon-toggle position-absolute top-50 end-0 translate-middle-y me-3" data-target="confirmNewPassword"></i>
                    </div>

                    <div id="password-requirements" class="mb-4">
                        <div class="row g-2">
                            <div class="col-6"><span class="requirement" id="length"><i class="bi bi-x-circle"></i> Mínimo 6 chars</span></div>
                            <div class="col-6"><span class="requirement" id="uppercase"><i class="bi bi-x-circle"></i> Letra Maiúscula</span></div>
                            <div class="col-6"><span class="requirement" id="lowercase"><i class="bi bi-x-circle"></i> Letra Minúscula</span></div>
                            <div class="col-6"><span class="requirement" id="special"><i class="bi bi-x-circle"></i> Número/Símbolo</span></div>
                            <div class="col-12"><span class="requirement" id="match"><i class="bi bi-x-circle"></i> Senhas Iguais</span></div>
                        </div>
                    </div>

                    <div id="reset-message" class="form-message-container mb-3"></div>
                    
                    <button type="submit" id="resetBtn" class="btn btn-primary-custom w-100 text-center justify-content-center">
                        <span class="btn-text">Salvar Nova Senha</span>
                        <div class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/reset-password.js"></script>
</body>
</html>
